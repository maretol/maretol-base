#:schema node_modules/wrangler/config-schema.json
# 内製CMSの管理ページ（cms_goal.md 参照）
# ログインは Cloudflare Access に委譲するため、アプリ側に認証機能は持たない
name = "admin-pages"
main = ".open-next/worker.js"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# TODO: 管理ページ用ドメイン（例: admin.maretol.xyz）に Cloudflare Access を設定してから
# routes を有効化する。Access 未設定のまま公開しないこと
routes = []
workers_dev = false

kv_namespaces = [
    # pages の CMS キャッシュ（公開・更新時にパージする。cms-cache-purger と同じ namespace）
    { binding = "CMS_CACHE", id = "eda084a77bf54fab906cd6b02fa1b3a1" },
    # KVプレビュー（draftKey互換）のドラフト保存先
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[[d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[dev]
port = 9601

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
ENV = "PRD"
PAGES_HOST = "https://www.maretol.xyz"

[env.staging]
name = "admin-pages-stg"
routes = []
# TODO: CRUD実装を載せる前に staging も Access 配下のドメインに切り替える
workers_dev = true
kv_namespaces = [
    { binding = "CMS_CACHE", id = "eda084a77bf54fab906cd6b02fa1b3a1" },
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[env.staging.vars]
ENV = "STG"
PAGES_HOST = "https://maretol-base-v3-stg.maretol-ruha.workers.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[observability]
enabled = true
