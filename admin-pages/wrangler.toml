#:schema node_modules/wrangler/config-schema.json
# 内製CMSの管理ページ（cms_goal.md 参照）
# ログインは Cloudflare Access に委譲するため、アプリ側に認証機能は持たない
name = "admin-pages"
main = ".open-next/worker.js"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# admin.maretol.xyz は Cloudflare Access 配下（2026-07-11 設定済み）
# Access 対象外の経路（workers.dev 等）は開けないこと
routes = [
    { pattern = "admin.maretol.xyz", custom_domain = true }
]
workers_dev = false

kv_namespaces = [
    # pages の CMS キャッシュ（公開・更新時にパージする。cms-cache-purger と同じ namespace）
    { binding = "CMS_CACHE", id = "eda084a77bf54fab906cd6b02fa1b3a1" },
    # KVプレビュー（draftKey互換）のドラフト保存先
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[[d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[dev]
port = 9601

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
ENV = "PRD"
PAGES_HOST = "https://www.maretol.xyz"

[env.staging]
name = "admin-pages-stg"
# staging は workers.dev ドメインで公開する。workers.dev も Cloudflare Access の
# アクセス制御下に設定済み（2026-07-11）のため公開しても認証がかかる
routes = []
workers_dev = true
kv_namespaces = [
    { binding = "CMS_CACHE", id = "eda084a77bf54fab906cd6b02fa1b3a1" },
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[env.staging.vars]
ENV = "STG"
PAGES_HOST = "https://maretol-base-v3-stg.maretol-ruha.workers.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[observability]
enabled = true
