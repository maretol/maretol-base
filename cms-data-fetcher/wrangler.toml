#:schema node_modules/wrangler/config-schema.json
name = "cms-data-fetcher"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
routes = [
    { pattern = "api.maretol.xyz", custom_domain = true },
    { pattern = "api.maretol.xyz/cms/*", zone_name = "maretol.xyz" }
]

kv_namespaces = [
    # KVプレビュー（draftKey互換）のドラフト参照先。admin-pages が書き込む
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[vars]
# サービスごとの参照先。'd1' で内製CMS（D1）、'microcms' で従来のmicroCMSを参照する
# illust はステージング検証済み（2026-07-11）のため本番も D1 を参照する
ATELIER_SOURCE = "d1"
# comic はステージング検証後に 'd1' へ切り替える
COMIC_SOURCE = "microcms"

[[d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[dev]
port = 8787

[env.staging]
name = "cms-data-fetcher-stg"
routes = [
    { pattern = "dev-api.maretol.xyz", custom_domain = true },
    { pattern = "dev-api.maretol.xyz/cms/*", zone_name = "maretol.xyz" }
]
kv_namespaces = [
    { binding = "CMS_DRAFT", id = "d472c0eaca4947bd8dc216a463ae0703" }
]

[env.staging.vars]
ATELIER_SOURCE = "d1"
# ステージングは先行してD1を参照する
COMIC_SOURCE = "d1"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "maretol-cms"
database_id = "58e13952-8750-4f5a-a75f-553bd4235f7c"

[observability]
enabled = true
