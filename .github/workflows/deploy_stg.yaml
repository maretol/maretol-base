name: deploy staging

on:
  pull_request:
    branches:
      - main
  workflow_call:

env:
  NODE_VERSION: 22.17.0
  WRANGLER_VERSION: '4'

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    environment:
      name: stg
    outputs:
      workflow: ${{ steps.filter.outputs.workflow }}
      pages: ${{ steps.filter.outputs.pages }}
      admin-pages: ${{ steps.filter.outputs.admin-pages }}
      ogp-data-fetcher: ${{ steps.filter.outputs.ogp-data-fetcher }}
      cms-data-fetcher: ${{ steps.filter.outputs.cms-data-fetcher }}
      cms-cache-purger: ${{ steps.filter.outputs.cms-cache-purger }}
      sns-article-publisher: ${{ steps.filter.outputs.sns-article-publisher }}
    steps:
      - uses: actions/checkout@v7
      - name: path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            pages:
              - "pages/**"
              - "packages/api-types/**"
              - "packages/cms-cache-key-gen/**"
            admin-pages:
              - "admin-pages/**"
              - "packages/api-types/**"
            ogp-data-fetcher:
              - "ogp-data-fetcher/**"
              - "packages/api-types/src/ogp_types.ts"
            cms-data-fetcher:
              - "cms-data-fetcher/**"
              - "packages/api-types/src/cms_types.ts"
              - "packages/api-types/src/cms_db_types.ts"
              - "packages/md-converter/**"
            cms-cache-purger:
              - "cms-cache-purger/**"
              - "packages/cms-cache-key-gen/**"
              - "packages/api-types/src/cms_webhook_types.ts"
            sns-article-publisher:
              - "sns-article-publisher/**"
              - "packages/api-types/src/sns_pub.ts"
              - "packages/api-types/src/cms_webhook_types.ts"
            workflow:
              - ".github/workflows/**"

  deploy-pages:
    needs: changes
    if: ${{ needs.changes.outputs.pages == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./pages
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm ci
        working-directory: ./
        run: npm ci
      - name: build
        working-directory: ./
        run: npm run build:page
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./pages
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  deploy-admin-pages:
    needs: changes
    if: ${{ needs.changes.outputs.admin-pages == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./admin-pages
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm ci
        working-directory: ./
        run: npm ci
      - name: build
        working-directory: ./
        run: npm run build:admin
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./admin-pages
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  deploy-ogp-data-fetcher:
    needs: changes
    if: ${{ needs.changes.outputs.ogp-data-fetcher == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./ogp-data-fetcher
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: pwd
        run: pwd
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./ogp-data-fetcher
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  deploy-cms-data-fetcher:
    needs: changes
    if: ${{ needs.changes.outputs.cms-data-fetcher == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./cms-data-fetcher
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: pwd
        run: pwd
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./cms-data-fetcher
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  deploy-cms-cache-purger:
    needs: changes
    if: ${{ needs.changes.outputs.cms-cache-purger == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./cms-cache-purger
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: pwd
        run: pwd
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./cms-cache-purger
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  deploy-sns-article-publisher:
    needs: changes
    if: ${{ needs.changes.outputs.sns-article-publisher == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: stg
    defaults:
      run:
        working-directory: ./sns-article-publisher
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: deploy by wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./sns-article-publisher
          command: deploy -e staging --config wrangler.toml
      - name: show done command
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  status:
    needs:
      [
        deploy-pages,
        deploy-admin-pages,
        deploy-ogp-data-fetcher,
        deploy-cms-data-fetcher,
        deploy-cms-cache-purger,
        deploy-sns-article-publisher,
      ]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: stg
    steps:
      - name: show status
        run: echo "deployed"
      - name: show error
        if: >-
          ${{
            needs.deploy-pages.result == 'failure' ||
            needs.deploy-admin-pages.result == 'failure' ||
            needs.deploy-ogp-data-fetcher.result == 'failure' ||
            needs.deploy-cms-data-fetcher.result == 'failure' ||
            needs.deploy-cms-cache-purger.result == 'failure' ||
            needs.deploy-sns-article-publisher.result == 'failure'
          }}
        env:
          build_result: ${{ needs.deploy-pages.result }}
          admin_result: ${{ needs.deploy-admin-pages.result }}
          ogp_result: ${{ needs.deploy-ogp-data-fetcher.result }}
          cms_result: ${{ needs.deploy-cms-data-fetcher.result }}
          cms_cache_result: ${{ needs.deploy-cms-cache-purger.result }}
          sns_result: ${{ needs.deploy-sns-article-publisher.result }}
        run: |
          echo "build result: $build_result"
          echo "admin result: $admin_result"
          echo "ogp result: $ogp_result"
          echo "cms result: $cms_result"
          echo "cms cache result: $cms_cache_result"
          echo "sns result: $sns_result"
          exit 1

  e2e:
    # status ジョブ成功（= どのデプロイも failure でない）時のみ実行する。
    # デプロイ失敗時は needs 不成立で自動 skip され、差分の有無に依存せず常時実行される。
    needs: [status]
    runs-on: ubuntu-latest
    environment:
      name: stg
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://maretol-base-v3-stg.maretol-ruha.workers.dev' }}
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm ci
        run: npm ci
      - name: resolve playwright version
        id: playwright
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: cache playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
      - name: install playwright browsers
        run: npx playwright install --with-deps chromium
      - name: run e2e tests
        run: npm run test:e2e
      - name: upload playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14
